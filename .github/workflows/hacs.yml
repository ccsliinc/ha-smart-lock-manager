name: HACS Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hacs:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: HACS validation
      uses: hacs/action@main
      with:
        category: integration

    - name: Validate integration structure
      run: |
        echo "🔍 Validating Home Assistant integration structure..."

        # Check required files
        required_files=(
          "custom_components/smart_lock_manager/__init__.py"
          "custom_components/smart_lock_manager/manifest.json"
          "custom_components/smart_lock_manager/config_flow.py"
          "hacs.json"
        )

        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "❌ Missing required file: $file"
            exit 1
          fi
          echo "✅ Found: $file"
        done

        # Check manifest requirements for HACS
        python -c "
        import json
        with open('custom_components/smart_lock_manager/manifest.json') as f:
            manifest = json.load(f)

        # HACS required fields
        hacs_required = ['documentation', 'issue_tracker', 'codeowners']
        for field in hacs_required:
            if field not in manifest:
                raise ValueError(f'HACS requires manifest field: {field}')
            print(f'✅ HACS field present: {field}')

        # Version format check (calendar versioning: YYYY.M.P, year not pinned)
        import re
        version = manifest['version']
        if not re.fullmatch(r'\d{4}\.\d{1,2}\.\d+', str(version)):
            raise ValueError(f'Expected CalVer format (YYYY.M.P), got: {version}')
        print(f'✅ Version format valid: {version}')
        "

        echo "✅ Integration structure validation passed"

  hassfest:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Run hassfest
      uses: home-assistant/actions/hassfest@master
