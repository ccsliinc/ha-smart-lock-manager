name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate manifest
      run: |
        python -c "
        import json
        with open('custom_components/smart_lock_manager/manifest.json') as f:
            manifest = json.load(f)
            print(f'✅ Manifest valid: {manifest[\"name\"]} v{manifest[\"version\"]}')
            required_fields = ['domain', 'name', 'version', 'documentation', 'issue_tracker', 'codeowners']
            for field in required_fields:
                if field not in manifest:
                    raise ValueError(f'Missing required field: {field}')
            print('✅ All required manifest fields present')
        "

    - name: Validate Python syntax
      run: |
        find custom_components/smart_lock_manager -name "*.py" -exec python -m py_compile {} \;
        echo "✅ Python syntax validation passed"

    - name: Test imports
      run: |
        cd custom_components/smart_lock_manager
        python -c "
        try:
            from const import DOMAIN, VERSION
            print(f'✅ Smart Lock Manager v{VERSION} imports successfully')
        except ImportError as e:
            print(f'❌ Import error: {e}')
            exit(1)
        "

    - name: Run security scan (Bandit)
      run: |
        pip install bandit
        bandit -r custom_components/smart_lock_manager/ -f json -o bandit-report.json || true
        bandit -r custom_components/smart_lock_manager/ -ll
        echo "✅ Security scan completed"

    - name: Run tests
      run: |
        # Pin homeassistant to the version the green local suite runs against
        # so pip does not backtrack to an old release with a different
        # zwave_js helper layout (which breaks module-level patching).
        # pycares is pinned because homeassistant 2025.8.0 leaves it unpinned and
        # the latest pycares (5.x) dropped ares_query_a_result, which aiodns 3.5.0
        # imports at startup -> AttributeError before any test runs.
        # zwave-js-server-python is the zwave_js component's runtime requirement,
        # needed so the lazy import of async_get_node_from_entity_id succeeds.
        pip install "homeassistant==2025.8.0" "pytest-homeassistant-custom-component==0.13.269" "pycares==4.10.0" "zwave-js-server-python==0.67.1"
        pip install pytest pytest-asyncio pytest-cov
        pytest tests/ --asyncio-mode=auto
        echo "✅ Test suite passed"

    - name: Validate HACS
      run: |
        python -c "
        import json
        with open('hacs.json') as f:
            hacs = json.load(f)
            print(f'✅ HACS config valid: {hacs[\"name\"]}')
            required = ['name']
            for field in required:
                if field not in hacs:
                    raise ValueError(f'Missing HACS field: {field}')
            disallowed = ['domains', 'iot_class', 'version']
            for field in disallowed:
                if field in hacs:
                    raise ValueError(f'Disallowed HACS field present: {field}')
        "
        echo "✅ HACS validation passed"

  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-tests-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-tests-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Pin homeassistant + pytest-homeassistant-custom-component to the
        # versions the green local suite runs against. Without the pin, pip
        # backtracks to an old homeassistant (2025.1.4) whose zwave_js helper
        # layout differs, breaking tests that patch module-level symbols.
        # pycares pinned: latest 5.x dropped ares_query_a_result, which
        # aiodns 3.5.0 (pulled by homeassistant 2025.8.0) imports at startup.
        # zwave-js-server-python is the zwave_js component's runtime requirement
        # (pip install homeassistant does not pull integration requirements);
        # without it the lazy import of async_get_node_from_entity_id fails and
        # the zwave service tests cannot patch that symbol.
        pip install "homeassistant==2025.8.0" "pytest-homeassistant-custom-component==0.13.269" "pycares==4.10.0" "zwave-js-server-python==0.67.1"
        pip install -e ".[dev]" pytest-cov pytest-asyncio

    - name: Run test suite
      run: |
        pytest tests/ --asyncio-mode=auto
        echo "✅ Test suite passed"
