version: '3.8'

services:
  homeassistant:
    container_name: ha-lock-dev
    image: homeassistant/home-assistant:latest
    volumes:
      # Mount custom component for live editing
      - ./custom_components:/config/custom_components
      # Mount dev config directory (throwaway, gitignored)
      - ./dev-config:/config
    ports:
      # Host 8124 -> container 8123 (8123 reserved for sprinkler dev HA)
      - "8124:8123"
    environment:
      - TZ=America/New_York
      # Dev-only flag: enables the in-memory Z-Wave mock layer (dev_mock.py).
      # MUST stay unset in production — when unset, SLM behavior is unchanged.
      - SLM_DEV_MOCK=1
    restart: unless-stopped
